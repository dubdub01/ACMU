# Déploiement o2switch via FTPS (port 21) — compatible filtrage IP o2switch.
# Le SSH (port 22) depuis GitHub Actions est en général bloqué ; le FTPS fonctionne.
#
# Secrets (comme le cours) :
#   SFTP_SERVER, SFTP_USERNAME, SFTP_PASSWORD
# Variable : O2SWITCH_DEPLOY = true
# Variable optionnelle : O2SWITCH_FTP_DIR (ex. nodejs-apps/acmu/ACMU/)

name: Deploy o2switch (FTPS)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-upload:
    if: >
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main')) &&
      vars.O2SWITCH_DEPLOY == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build
      NEXTAUTH_URL: https://acmu.be
      NEXTAUTH_SECRET: deploy-build-secret-32chars-min
      NEXT_PRIVATE_DISABLE_RUST_COMPILER: "1"
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Installation et build
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Nettoyage avant envoi FTP
        run: |
          rm -rf node_modules .git .github
          rm -f .env .env.local .env.*.local .ftp-deploy-sync-state.json prisma.config.ts
          mkdir -p tmp
          date -u +%Y-%m-%dT%H:%M:%SZ > tmp/restart.txt

      - name: Chemin FTP (sans espaces ni retours ligne)
        run: |
          DIR="${{ vars.O2SWITCH_FTP_DIR }}"
          DIR="${DIR:-nodejs-apps/acmu/ACMU/}"
          DIR="$(printf '%s' "$DIR" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          echo "FTP_DIR=$DIR" >> "$GITHUB_ENV"

      - name: Supprimer l'état sync FTP distant (évite erreurs 550/553)
        continue-on-error: true
        env:
          FTP_USER: ${{ secrets.SFTP_USERNAME }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          FTP_HOST: ${{ secrets.SFTP_SERVER }}
        run: |
          # Chemins obsolètes (ex. praticiens.segments) → 550 si le JSON sync reste. curl uniquement (< 10 s).
          for f in .ftp-deploy-sync-state.json .ftp-deploy-sync-state-v2.json; do
            curl --ftp-ssl-reqd --ftp-method nocwd -sS --max-time 30 \
              -u "${FTP_USER}:${FTP_PASS}" \
              "ftp://${FTP_HOST}/${{ env.FTP_DIR }}${f}" \
              -Q "DELE ${f}" 2>/dev/null || true
            curl --ftp-ssl-reqd --ftp-method nocwd -sS --max-time 30 \
              -u "${FTP_USER}:${FTP_PASS}" \
              "ftp://${FTP_HOST}/${{ env.FTP_DIR }}" \
              -Q "DELE ${f}" 2>/dev/null || true
          done

      - name: Déploiement FTPS sur o2switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ./${{ env.FTP_DIR }}
          state-name: .ftp-deploy-sync-state-v2.json
          dangerous-clean-slate: false
          log-level: minimal
          exclude: |
            **/.git*
            **/.github/**
            /node_modules/**
            **/.env
            **/.env.*
            **/.next/dev/**
            **/.ftp-deploy-sync-state.json
            **/.ftp-deploy-sync-state-v2.json
            **/prisma.config.ts
            **/*.segments/**
