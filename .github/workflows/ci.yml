name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ci-secret-minimum-32-characters-long

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Client Prisma
        run: npx prisma generate

      - name: Build production
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: ESLint (non bloquant le temps de corriger les erreurs existantes)
        run: npm run lint
